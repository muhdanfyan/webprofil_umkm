local_backend: true
backend:
  name: git-gateway
  branch: main # Use the main branch for production

media_folder: "public/images/uploads" # Folder where user uploaded files should go
public_folder: "/images/uploads" # The src attribute for uploaded images

collections:
  - name: "identity"
    label: "Identitas Bisnis"
    delete: false
    editor:
      preview: false
    files:
      - name: "settings"
        label: "Pengaturan Identitas"
        file: "src/content/identity/settings.yml"
        fields:
          - { label: "Nama Bisnis", name: "name", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Deskripsi", name: "description", widget: "text" }
          - { label: "Logo", name: "logo", widget: "image" }
          - { label: "Favicon", name: "favicon", widget: "image" }
          - label: "Warna Tema"
            name: "theme_color"
            widget: "object"
            fields:
              - { label: "Warna Utama", name: "primary", widget: "color" }
              - { label: "Warna Aksen", name: "accent", widget: "color" }
          - label: "Kontak"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Nama Kontak", name: "name", widget: "string" }
              - { label: "Telepon", name: "phone", widget: "string" }
              - { label: "WhatsApp Link", name: "whatsapp", widget: "string" }
              - { label: "Email", name: "email", widget: "string", required: false }
              - { label: "Instagram Link", name: "instagram", widget: "string", required: false }
              - { label: "Facebook Link", name: "facebook", widget: "string", required: false }
          - label: "Lokasi"
            name: "location"
            widget: "object"
            fields:
              - { label: "Alamat Lengkap", name: "address", widget: "text", required: false }
              - { label: "URL Embed Google Maps", name: "map_embed_url", widget: "string" }
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Judul Utama", name: "title", widget: "string" }
              - { label: "Sub Judul", name: "subtitle", widget: "text" }
              - { label: "Gambar Hero", name: "image", widget: "image" }
          - label: "Keunggulan"
            name: "advantages"
            widget: "list"
            fields:
              - { label: "Judul", name: "title", widget: "string" }
              - { label: "Deskripsi", name: "description", widget: "text" }
              - { label: "Icon (Nama Lucide/Heroicon)", name: "icon", widget: "string" }
          - label: "Layanan"
            name: "services"
            widget: "list"
            fields:
              - { label: "Nama Layanan", name: "title", widget: "string" }
              - { label: "Deskripsi Singkat", name: "description", widget: "text" }
              - { label: "Gambar", name: "image", widget: "image" }
          - label: "Alur Proses"
            name: "steps"
            widget: "object"
            fields:
              - { label: "Judul Seksi", name: "title", widget: "string" }
              - label: "Langkah-langkah"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Judul Langkah", name: "title", widget: "string" }
                  - { label: "Keterangan", name: "description", widget: "text" }
          - label: "FAQ"
            name: "faqs"
            widget: "list"
            fields:
              - { label: "Pertanyaan", name: "question", widget: "string" }
              - { label: "Jawaban", name: "answer", widget: "text" }
          - label: "Tips Penting"
            name: "tips"
            widget: "list"
            fields:
              - { label: "Judul Tips", name: "title", widget: "string" }
              - { label: "Poin-poin", name: "points", widget: "list", field: { label: "Isi Poin", widget: "string" } }
          - label: "Statistik"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Nilai (e.g. 1000+)", name: "value", widget: "string" }
              - { label: "Icon", name: "icon", widget: "string" }
          - label: "Testimoni"
            name: "testimonials"
            widget: "list"
            fields:
              - { label: "Nama", name: "name", widget: "string" }
              - { label: "Teks", name: "text", widget: "text" }
              - { label: "Lokasi/Jabatan", name: "location", widget: "string" }
              - { label: "Rating (1-5)", name: "rating", widget: "number", value_type: "int", min: 1, max: 5 }

  - name: "blog" # Used in routes, e.g., /admin/collections/blog
    label: "Blog" # Used in the UI
    folder: "src/content/blog" # The path to the folder where the documents are stored
    create: true # Allow users to create new documents in this collection
    slug: "{{slug}}" # Filename template, e.g., title.md
    summary: "{{judul}}"
    view_style: "grid"
    fields: # The fields for each document, usually in front matter
      - { label: "Judul", name: "judul", widget: "string" }
      - { label: "Tanggal", name: "tanggal", widget: "datetime" }
      - { label: "Kategori", name: "kategori", widget: "string" }
      - { label: "Gambar", name: "image", widget: "image" }
      - { label: "Body", name: "body", widget: "markdown" }
