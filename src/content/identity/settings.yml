steps:
  title: "Cara Memesan di Wiyasa"
  items:
    - title: "Pilih Produk"
      description: "Jelajahi galeri produk kami atau konsultasikan kebutuhan Anda pada admin kami."
    - title: "Konfirmasi Pesanan"
      description: "Segera konfirmasi pesanan Anda melalui WhatsApp untuk pengecekan stok."
    - title: "Pembayaran & Pengiriman"
      description: "Lakukan pembayaran dan pesanan Anda akan segera kami kirim ke alamat tujuan."
faqs:
  - question: "Apakah produk Wiyasa memiliki garansi?"
    answer: "Ya, kami menjamin keaslian produk. Untuk barang tertentu, tersedia garansi retur jika terjadi kerusakan saat pengiriman."
  - question: "Berapa lama waktu pengirimannya?"
    answer: "Untuk dalam kota biasanya 1-2 hari kerja, sedangkan luar kota tergantung jasa pengiriman yang dipilih (biasanya 3-5 hari)."
  - question: "Bisa bayar di tempat (COD)?"
    answer: "Saat ini kami melayani COD khusus untuk wilayah Yogyakarta dengan syarat dan ketentuan berlaku."
tips:
  - title: "Cara Belanja Aman"
    points:
      - "Pastikan nomor WhatsApp admin sudah benar (cek di kontak)."
      - "Gunakan metode pembayaran resmi yang disediakan."
      - "Simpan bukti transfer untuk konfirmasi pesanan."
  - title: "Perawatan Produk"
    points:
      - "Simpan produk di tempat yang kering dan sejuk."
      - "Ikuti petunjuk penggunaan yang ada pada kemasan."
      - "Hubungi tim support jika butuh panduan penggunaan."
